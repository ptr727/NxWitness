name: Build Docker image task


on:
  workflow_call:
    inputs:
      push:
        required: false
        type: boolean
        default: false
      # Smoke mode: build a single Ubuntu + single LSIO variant on amd64
      # only, never push. Used for fast PR feedback in place of the full
      # matrix. See test-pull-request.yml.
      smoke:
        required: false
        type: boolean
        default: false
      # Logical branch whose Matrix.json rows to build/push and whose
      # registry buildcache tag to use. Decoupled from `ref` so `ref` can be pinned to an
      # immutable commit (e.g. the publisher pins main to the versioned SHA)
      # while this still selects the right branch's rows. Empty in smoke mode
      # builds both branches' rows. The publisher passes main and develop so
      # both branches' tags are produced from one scheduled run. Empty in a
      # non-smoke build falls back to github.ref_name for the buildcache tag.
      branch:
        required: false
        type: string
        default: ''
      # Immutable git ref to check out / version, decoupled from branch/tag
      # selection (see `branch`). Empty uses the triggering ref (PR context).
      # The publisher pins this to the exact versioned commit so the image's
      # embedded version matches the GitHub release tag even if the branch
      # advances mid-run.
      ref:
        required: false
        type: string
        default: ''
      # When false the caller is expected to have built the base images
      # already (the publisher builds them once, see publish-release.yml),
      # so the internal base build is skipped.
      build_base:
        required: false
        type: boolean
        default: true
      # SemVer2 threaded from the orchestrator's single NBGV run (get-version-task), baked into the image as
      # LABEL_VERSION. NBGV is never re-run here, so one classification feeds every product leg (avoids a
      # second NBGV run reclassifying and producing a wrong/colliding tag). Smoke callers omit it and bake
      # the placeholder default below (smoke images are never pushed, so the label is informational only).
      semver2:
        required: false
        type: string
        default: '0.0.0-smoke'

jobs:

  get-matrix:
    name: Get matrix job
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.getmatrix.outputs.matrix }}

    steps:

      - name: Checkout step
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Load matrix.json step
        id: getmatrix
        env:
          SMOKE: ${{ inputs.smoke }}
          BRANCH: ${{ inputs.branch }}
        run: |
          # $b below is a jq variable (passed via --arg), not a shell
          # variable, so it must stay single-quoted / unexpanded.
          # shellcheck disable=SC2016
          if [[ "$SMOKE" == "true" ]]; then
            # One Ubuntu + one LSIO variant exercises the shared Dockerfile
            # build logic and the branch's build args. Tags are irrelevant
            # since smoke never pushes. Restrict to the PR base branch ($b)
            # so a PR onto develop validates the develop rows and a PR onto
            # main validates the main rows. Empty $b builds both branches.
            FILTER='.Images |= (map(select((.Name == "NxMeta" or .Name == "NxMeta-LSIO") and ($b == "" or .Branch == $b))) | unique_by([.Name, .Branch]))'
          elif [[ -n "$BRANCH" ]]; then
            # Publish: build only the rows targeting the branch being built
            # (avoids building the other branch's rows just to discard them).
            FILTER='.Images |= map(select(.Branch == $b))'
          else
            FILTER='.'
          fi
          echo "matrix=$(jq --arg b "$BRANCH" --compact-output "$FILTER" ./Make/Matrix.json)" >> "$GITHUB_OUTPUT"

  build-base:
    name: Build base image job
    if: ${{ inputs.build_base }}
    uses: ./.github/workflows/build-base-images-task.yml
    with:
      push: ${{ inputs.push }}
      platforms: ${{ (!inputs.smoke && inputs.branch == 'main') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
      ref: ${{ inputs.ref }}
    secrets: inherit

  build-docker:
    name: Build Docker image job
    runs-on: ubuntu-latest
    needs: [get-matrix, build-base]
    # always() so the job still runs when build-base is intentionally
    # skipped (build_base == false). Fail only if a prerequisite failed.
    if: >-
      ${{ always()
      && needs.get-matrix.result == 'success'
      && (needs.build-base.result == 'success' || needs.build-base.result == 'skipped') }}

    strategy:
      max-parallel: 4
      matrix:
        images: ${{ fromJson(needs.get-matrix.outputs.matrix).Images }}

    env:
      # Multi-arch (amd64+arm64) only on a full main publish. Smoke and develop build amd64 only.
      PLATFORMS: ${{ (!inputs.smoke && inputs.branch == 'main') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}

    steps:

      - name: Checkout step
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      # arm64 is non-native on the amd64 runner, so install its QEMU emulator only when the build includes it.
      - name: Setup QEMU step
        if: ${{ contains(env.PLATFORMS, 'arm64') }}
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm64

      - name: Setup Buildx step
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          platforms: ${{ env.PLATFORMS }}

      # Log in on every build (including smoke), for higher pull/cache rate limits against the branch-scoped
      # registry buildcache. DOCKER_HUB_USERNAME / DOCKER_HUB_ACCESS_TOKEN must be in both the Actions and
      # Dependabot secret stores so a Dependabot-triggered push CI run can log in too. Forks cannot push here.
      - name: Login to Docker Hub step
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Create tags and args step
        id: tagsargs
        run: |
          set -euo pipefail
          TAGS=$(jq -r '.[]' <<< '${{ toJson(matrix.images.Tags) }}')
          ARGS=$(jq -r '.[]' <<< '${{ toJson(matrix.images.Args) }}')
          CACHE_REPO=$(jq -r '.[0]' <<< '${{ toJson(matrix.images.Tags) }}' | sed 's/:[^:]*$//')
          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
            echo "args<<EOF"
            echo "$ARGS"
            echo "LABEL_VERSION=${{ inputs.semver2 }}"
            echo "EOF"
            echo "cache_repo=$CACHE_REPO"
          } >> "$GITHUB_OUTPUT"

      - name: Docker build and push step
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          # Matrix is already filtered to the target branch, so push when asked.
          # Smoke callers pass push:false.
          push: ${{ inputs.push }}
          context: Docker
          file: Docker/${{ matrix.images.Name }}.Dockerfile
          platforms: ${{ env.PLATFORMS }}
          tags: ${{ steps.tagsargs.outputs.tags }}
          build-args: ${{ steps.tagsargs.outputs.args }}
          cache-from: |
            type=registry,ref=${{ steps.tagsargs.outputs.cache_repo }}:buildcache-develop
            type=registry,ref=${{ steps.tagsargs.outputs.cache_repo }}:buildcache-main
          cache-to: |
            ${{ inputs.push && format('type=registry,ref={0}:buildcache-{1},mode=min,ignore-error=true', steps.tagsargs.outputs.cache_repo, inputs.branch != '' && inputs.branch || github.ref_name) || '' }}
