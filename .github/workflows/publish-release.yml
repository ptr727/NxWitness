name: Publish project release action

# Sole publisher. Images are built and pushed ONLY here: on the weekly
# schedule or via manual dispatch. Merges to main/develop no longer build
# or publish (PRs get a fast smoke build instead, see test-pull-request.yml).
# One run publishes both the main (:latest/:stable) and develop (:develop)
# tags, picking up everything merged since the last run (codegen version
# bumps, Dependabot base-image bumps, code changes).

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * MON'

# Single global group (not ref-scoped): this workflow pushes shared tags
# (base images, both branches, readme, badge), so two dispatches on
# different refs must not run concurrently and race on those shared tags.
# cancel-in-progress: false queues the next run instead of cancelling an
# in-flight publish, which could otherwise leave a partially pushed tag set.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:

  # Pin the release version to main: this run's GitHub release tracks the
  # main publish, so compute it from main even when dispatched from another ref.
  get-version:
    name: Get version information job
    uses: ./.github/workflows/get-version-task.yml
    secrets: inherit
    with:
      ref: main

  # Base images share a single tag (nx-base:ubuntu-noble) across branches,
  # so build them once (from the release branch) and let both branch legs
  # reuse them via build_base: false.
  build-base:
    name: Build base image job
    uses: ./.github/workflows/build-base-images-task.yml
    secrets: inherit
    with:
      push: true
      # Always build the shared nx-base tag from main, even when dispatched
      # from another ref, so a develop dispatch can't overwrite main's base.
      ref: main

  build-main:
    name: Build main images job
    needs: [get-version, build-base]
    uses: ./.github/workflows/build-docker-task.yml
    secrets: inherit
    with:
      push: true
      branch: main
      # Pin to the exact commit get-version computed the release version from,
      # not the moving `main` ref: this closes the race where a commit landing
      # on main mid-run could make the pushed image's embedded version come
      # from a newer commit than the GitHub release of the same SemVer2 tag.
      ref: ${{ needs.get-version.outputs.GitCommitId }}
      build_base: false

  build-develop:
    name: Build develop images job
    needs: [build-base]
    uses: ./.github/workflows/build-docker-task.yml
    secrets: inherit
    with:
      push: true
      # Develop only publishes the mutable :develop tag (no versioned GitHub
      # release), so the moving ref can't cause a tag/release mismatch; no
      # commit pin needed.
      branch: develop
      ref: develop
      build_base: false

  # Gate on both build legs so a release is never published when develop
  # is still building or failed. Release metadata/assets track main.
  github-release:
    name: Publish GitHub release job
    needs: [get-version, build-main, build-develop]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # Check out the exact built commit so the uploaded release files match the tag even if the branch advances mid-run.
      - name: Checkout code step
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.get-version.outputs.GitCommitId }}

      # Backstop (main only): a public release must not carry a prerelease '-', guarding against NBGV mis-versioning the
      # public ref (e.g. a dispatch on a non-default ref) into a malformed "Latest" release. Strip '+buildmetadata'
      # first - a '-' there is legitimate; only a '-' in the core/prerelease segment marks a prerelease.
      - name: Verify public release version step
        env:
          SEMVER2: ${{ needs.get-version.outputs.SemVer2 }}
        run: |
          set -euo pipefail
          CORE_AND_PRE="${SEMVER2%%+*}"   # drop +buildmetadata; a '-' here is the genuine prerelease separator
          if [[ "$CORE_AND_PRE" == *-* ]]; then
            echo "::error::Public (main) release version '$SEMVER2' carries a prerelease suffix; refusing to publish."
            exit 1
          fi

      # The weekly publisher re-runs even with no new commits, so the version may already be released. Skip the release
      # step when a release for this tag already exists to avoid a no-op republish.
      - name: Check for existing release step
        id: release-exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.get-version.outputs.SemVer2 }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              echo "Release $TAG already exists; workflow_dispatch will refresh it."
            else
              echo "Release $TAG already exists; skipping release creation (no-op republish)."
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # `target_commitish` must be set explicitly: otherwise GitHub's REST API tags the release on the default branch.
      # Pin it to `GitCommitId` so the tag is on the exact built commit, consistent with the SemVer2 tag and artifacts.
      # Skip when the release already exists, but always let a manual `workflow_dispatch` through to refresh it.
      # Every release is a tag on the built commit plus the auto-attached source zip, README, and LICENSE. This is a
      # Docker-only repo: it ships no `release-asset-*` binaries/packages, so the release carries no extra files and
      # `fail_on_unmatched_files` is omitted (see Template adaptations in AGENTS.md). The image is the published artifact
      # on Docker Hub.
      - name: Create GitHub release step
        if: ${{ steps.release-exists.outputs.exists == 'false' || github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          tag_name: ${{ needs.get-version.outputs.SemVer2 }}
          target_commitish: ${{ needs.get-version.outputs.GitCommitId }}
          # This run's release represents the main publish.
          prerelease: false
          files: |
            LICENSE
            README.md

  # Derive the Docker Hub repository list from main's Matrix.json (lowercased ptr727/<image> plus the shared base
  # repos) so the generic readme task can matrix over it. Computed in the caller because the list is repo-specific.
  get-repos:
    name: Get docker repositories job
    needs: [build-main, build-develop]
    runs-on: ubuntu-latest
    outputs:
      repositories: ${{ steps.repos.outputs.repositories }}
    steps:
      - name: Checkout code step
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
      - name: Load repositories from Matrix.json step
        id: repos
        run: |
          set -euo pipefail
          repos=$(jq --compact-output '[.Images[].Name | ascii_downcase | "ptr727/\(.)"] + ["ptr727/nx-base","ptr727/nx-base-lsio"] | sort | unique' ./Make/Matrix.json)
          echo "repositories=$repos" >> "$GITHUB_OUTPUT"

  docker-readme:
    name: Publish docker hub readme job
    needs: [build-main, build-develop, get-repos]
    uses: ./.github/workflows/publish-docker-readme-task.yml
    secrets: inherit
    with:
      # Readme content tracks main, consistent with the version/release.
      ref: main
      repositories: ${{ needs.get-repos.outputs.repositories }}

  date-badge:
    name: Create BYOB date badge job
    needs: [build-main, build-develop]
    uses: ./.github/workflows/build-datebadge-task.yml
    secrets: inherit
    permissions:
      contents: write

  # Workflow artifacts are an intra-run handoff (durable copies live on the
  # GitHub release and Docker Hub), so leaving them accumulates against the small
  # account-wide storage quota; delete them once every consumer has read them.
  # This publisher always publishes when it runs (schedule/dispatch only), so no
  # publish gate is needed beyond always().
  cleanup-artifacts:
    name: Delete workflow artifacts job
    needs: [build-base, build-main, build-develop, github-release, get-repos, docker-readme, date-badge]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete workflow artifacts step
        # continue-on-error: best-effort housekeeping must never red the run, even on an unexpected failure.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! ids=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --paginate \
            --jq '.artifacts[].id'); then
            echo "::warning::Could not list run artifacts; skipping cleanup (storage may not be freed)."
            ids=""
          fi
          for artifact_id in $ids; do
            gh api --method DELETE "repos/${{ github.repository }}/actions/artifacts/$artifact_id" \
              || echo "::warning::Failed to delete artifact $artifact_id; continuing."
          done
