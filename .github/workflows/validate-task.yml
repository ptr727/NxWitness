name: Validate task

# The single validation gate: Husky lint (CSharpier + dotnet format style) + dotnet test. Reused by
# test-pull-request (produces the required check) and could be reused by the publisher, so the CI and publish
# gates are the identical definition. Does not build images.

on:
  workflow_call:
    inputs:
      # Git ref to validate (empty = default checkout ref). A publisher caller passes its trigger branch so the
      # publish run validates the branch it publishes.
      ref:
        required: false
        type: string
        default: ''

jobs:

  validate:
    name: Validate job
    runs-on: ubuntu-latest

    steps:

      - name: Setup .NET SDK step
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.x

      - name: Checkout code step
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      # Husky runs the same CSharpier + dotnet format style checks the editor and the pre-commit hook run.
      - name: Check code style step
        run: |
          set -euo pipefail
          dotnet tool restore
          dotnet husky install
          dotnet husky run

      # Docker image is digest-pinned (version in the trailing comment) so CI is reproducible.
      - name: Check line endings step
        run: docker run --rm -v "$PWD":/check --workdir /check mstruebing/editorconfig-checker@sha256:67b9e9b16a674e36f7c05919da789f03a01d343ca8423eb8797179399af07c00 # editorconfig-checker v3.4.0

      # --collect drives coverlet.collector to emit Cobertura XML into ./coverage/<guid>/.
      - name: Run unit tests step
        run: dotnet test --collect:"XPlat Code Coverage" --results-directory ./coverage

      # Report-only: fail_ci_if_error is false so a Codecov hiccup or an absent token never fails the gate.
      - name: Upload coverage to Codecov step
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          directory: ./coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
